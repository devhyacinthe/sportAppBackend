<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1a2744"/>
    </linearGradient>
    <linearGradient id="ballGrad" x1="180" y1="180" x2="844" y2="844" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="50%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <radialGradient id="innerGlow" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#bfdbfe" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="ballClip">
      <circle cx="512" cy="512" r="292"/>
    </clipPath>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="200" fill="url(#bgGrad)"/>

  <!-- Ambient glow rings -->
  <circle cx="512" cy="512" r="390" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.15"/>
  <circle cx="512" cy="512" r="370" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.08"/>
  <circle cx="512" cy="512" r="360" fill="#3b82f6" opacity="0.05"/>

  <!-- Ball shadow -->
  <ellipse cx="530" cy="830" rx="240" ry="28" fill="#000" opacity="0.35"/>

  <!-- Main ball -->
  <circle cx="512" cy="512" r="292" fill="url(#ballGrad)" filter="url(#softGlow)"/>

  <!-- Inner highlight -->
  <circle cx="512" cy="512" r="292" fill="url(#innerGlow)"/>

  <!-- Basketball seam lines clipped inside ball -->
  <g clip-path="url(#ballClip)" stroke="rgba(255,255,255,0.55)" stroke-width="22" fill="none" stroke-linecap="round">
    <path d="M 512 220 C 390 330 390 694 512 804"/>
    <path d="M 512 220 C 634 330 634 694 512 804"/>
    <path d="M 220 512 C 330 390 694 390 804 512"/>
    <path d="M 220 512 C 330 634 694 634 804 512"/>
  </g>

  <!-- Ball border -->
  <circle cx="512" cy="512" r="292" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="3"/>

  <!-- Specular highlight -->
  <ellipse cx="440" cy="400" rx="90" ry="55" fill="white" opacity="0.18" transform="rotate(-30 440 400)"/>
</svg>
